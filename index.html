<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduSystem RK</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<style>
:root { --primary:#4f46e5; --sidebar:#0f172a; --bg:#f1f5f9; }
*{font-family:Segoe UI;margin:0;box-sizing:border-box}
body{display:flex;height:100vh;background:var(--bg)}
.hidden{display:none!important}

.overlay{position:fixed;inset:0;background:#0f172a;display:flex;align-items:center;justify-content:center}
.card{background:#fff;padding:25px;border-radius:15px;width:420px}

input,select,textarea{width:100%;padding:10px;margin:6px 0;border:1px solid #ddd;border-radius:8px}
.btn{background:var(--primary);color:#fff;border:none;padding:12px;width:100%;border-radius:10px}

aside{width:260px;background:var(--sidebar);color:#fff;padding:20px}
main{flex:1;padding:20px;overflow:auto}

.menu-btn{background:#1e293b;color:#cbd5e1;padding:10px;margin:5px 0;border:none;width:100%;border-radius:8px;cursor:pointer}
.menu-btn:hover{background:var(--primary);color:#fff}

table{width:100%;margin-top:15px;border-collapse:collapse}
td,th{border:1px solid #ddd;padding:8px;text-align:center}
th{background:#f8fafc}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="overlay">
  <div class="card">
    <h2>Login</h2>
    <button class="btn" onclick="login()">Войти через Google</button>
  </div>
</div>

<!-- REG -->
<div id="reg" class="overlay hidden">
  <div class="card">
    <h3>Регистрация</h3>
    <input id="name" placeholder="ФИО">
    <select id="class"></select>
    <textarea id="proof" placeholder="Почему хотите участвовать"></textarea>
    <button class="btn" onclick="save()">Отправить</button>
  </div>
</div>

<!-- WAIT -->
<div id="wait" class="overlay hidden">
  <div class="card">
    <h3>Заявка на проверке</h3>
  </div>
</div>

<!-- MAIN -->
<div id="main" class="hidden" style="display:flex;width:100%">

<aside>
<h3 id="role"></h3>
<div id="menu"></div>

<div id="admin" class="hidden">
<hr>
<button class="menu-btn" onclick="loadReq()">Заявки</button>
</div>

</aside>

<main>
<h3>Панель</h3>
<table>
<thead><tr><th>Имя</th><th>Статус</th><th>Роль</th></tr></thead>
<tbody id="tbl"></tbody>
</table>
</main>

</div>

<!-- MODAL -->
<div id="modal" class="overlay hidden">
  <div class="card">
    <h3>Назначить предмет</h3>
    <select id="subject">
      <option>Математика</option>
      <option>Физика</option>
      <option>Информатика</option>
      <option>История</option>
    </select>
    <button class="btn" onclick="confirm()">OK</button>
  </div>
</div>

<script>
firebase.initializeApp({
apiKey:"x",
authDomain:"x",
databaseURL:"x"
});

const db=firebase.database();
const auth=firebase.auth();

let userData=null;
let tempId=null;

const classes=[...Array(11)].map((_,i)=>i+1+"А");

classes.forEach(c=>{
  const o=document.createElement("option");
  o.innerText=c;
  document.getElementById("class").appendChild(o);
});

function login(){
auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}

auth.onAuthStateChanged(u=>{
if(!u){show("login");return;}

db.ref("users/"+u.uid).once("value",s=>{
const d=s.val();

if(!d){
show("reg");
return;
}

if(d.status==="pending"){
show("wait");
return;
}

userData=d;
start();
});
});

function save(){
db.ref("users/"+auth.currentUser.uid).set({
name:document.getElementById("name").value,
class:document.getElementById("class").value,
proof:document.getElementById("proof").value,
role:"student",
status:"pending",
subjects:[]
});
}

function start(){
show("main");
document.getElementById("role").innerText=userData.role;

if(userData.role==="admin"){
document.getElementById("admin").classList.remove("hidden");
}

document.getElementById("menu").innerHTML=
(userData.subjects||[]).map(s=>`<button class="menu-btn">${s}</button>`).join("");
}

function loadReq(){
db.ref("users").once("value",s=>{
const d=s.val();
let html="";

for(let id in d){
if(d[id].status==="pending"){
html+=`
<tr>
<td>${d[id].name}</td>
<td>${d[id].status}</td>
<td>
<button onclick="openModal('${id}')">approve</button>
</td>
</tr>`;
}
}

document.getElementById("tbl").innerHTML=html;
});
}

function openModal(id){
tempId=id;
show("modal");
}

function confirm(){
db.ref("users/"+tempId).update({
status:"approved",
role:"teacher",
subjects:[document.getElementById("subject").value]
});

show("main");
}

function show(id){
document.querySelectorAll(".overlay,#main").forEach(e=>e.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}
</script>

</body>
</html>
