<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduSystem RK</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<style>
*{font-family:Arial;margin:0;box-sizing:border-box}
body{display:flex;height:100vh}
.hidden{display:none!important}

.overlay{position:fixed;inset:0;background:#0f172a;display:flex;align-items:center;justify-content:center}
.card{background:#fff;padding:20px;border-radius:10px;width:400px}

aside{width:250px;background:#111827;color:#fff;padding:15px}
main{flex:1;padding:20px}

.menu-btn{width:100%;padding:10px;margin:5px 0;background:#1f2937;color:#fff;border:none;border-radius:6px;cursor:pointer}
.menu-btn:hover{background:#4f46e5}

table{width:100%;border-collapse:collapse}
td,th{border:1px solid #ddd;padding:8px;text-align:center}
button{cursor:pointer}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="overlay">
  <div class="card">
    <h3>Вход</h3>
    <button onclick="login()">Google login</button>
  </div>
</div>

<!-- REG -->
<div id="reg" class="overlay hidden">
  <div class="card">
    <h3>Регистрация</h3>
    <input id="name" placeholder="ФИО">
    <select id="class"></select>
    <textarea id="proof" placeholder="Комментарий"></textarea>
    <button onclick="save()">Отправить</button>
  </div>
</div>

<!-- WAIT -->
<div id="wait" class="overlay hidden">
  <div class="card">
    <h3>Заявка на проверке</h3>
  </div>
</div>

<!-- MAIN -->
<div id="main" class="hidden" style="display:flex;width:100%">

<aside>
<h3 id="role"></h3>
<div id="menu"></div>

<div id="adminBlock" class="hidden">
<hr>
<button class="menu-btn" onclick="loadRequests()">Заявки</button>
</div>

</aside>

<main>
<h3>Пользователи</h3>
<table>
<thead>
<tr><th>Имя</th><th>Статус</th><th>Роль</th></tr>
</thead>
<tbody id="table"></tbody>
</table>
</main>

</div>

<!-- MODAL -->
<div id="modal" class="overlay hidden">
  <div class="card">
    <h3>Одобрение пользователя</h3>
    <p id="userInfo"></p>

    <select id="subject">
      <option value="">Сделать учеником</option>
      <option>Математика</option>
      <option>Физика</option>
      <option>Информатика</option>
      <option>История</option>
    </select>

    <button onclick="confirmApprove()">Подтвердить</button>
    <button onclick="closeModal()">Отмена</button>
  </div>
</div>

<script>
firebase.initializeApp({
apiKey:"x",
authDomain:"x",
databaseURL:"x"
});

const db=firebase.database();
const auth=firebase.auth();

let currentUser=null;
let pendingUser=null;

// классы
const classes=[...Array(11)].map((_,i)=>i+1+"А");
classes.forEach(c=>{
const o=document.createElement("option");
o.textContent=c;
document.getElementById("class").appendChild(o);
});

// LOGIN
function login(){
auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}

// AUTH
auth.onAuthStateChanged(u=>{
if(!u){show("login");return;}

db.ref("users/"+u.uid).once("value",s=>{
const d=s.val();

if(!d){
show("reg");
return;
}

if(d.status==="pending"){
show("wait");
return;
}

currentUser=d;
start();
});
});

// SAVE REG
function save(){
db.ref("users/"+auth.currentUser.uid).set({
name:document.getElementById("name").value,
class:document.getElementById("class").value,
proof:document.getElementById("proof").value,
role:"student",
status:"pending",
subjects:[]
});
}

// START APP
function start(){
show("main");

document.getElementById("role").innerText=currentUser.role;

if(currentUser.role==="admin"){
document.getElementById("adminBlock").classList.remove("hidden");
}

document.getElementById("menu").innerHTML=
(currentUser.subjects||[]).map(s=>`<button class="menu-btn">${s}</button>`).join("");
}

// LOAD REQUESTS
function loadRequests(){
db.ref("users").once("value",s=>{
const d=s.val();
let html="";

for(let id in d){
if(d[id].status==="pending"){
html+=`
<tr>
<td>${d[id].name}</td>
<td>${d[id].status}</td>
<td><button onclick="openModal('${id}')">approve</button></td>
</tr>`;
}
}

document.getElementById("table").innerHTML=html;
});
}

// OPEN MODAL
function openModal(id){
pendingUser=id;

db.ref("users/"+id).once("value",s=>{
document.getElementById("userInfo").innerText=s.val().name;
});

show("modal");
}

// CONFIRM APPROVE
function confirmApprove(){
const subject=document.getElementById("subject").value;

let update={status:"approved"};

if(subject){
update.role="teacher";
update.subjects=[subject];
}

db.ref("users/"+pendingUser).update(update);

closeModal();
loadRequests();
}

// CLOSE MODAL
function closeModal(){
show("main");
}

// SHOW
function show(id){
document.querySelectorAll(".overlay,#main").forEach(e=>e.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}
</script>

</body>
</html>
