<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSystem RK | Final Fixed</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>

    <style>
        :root { --primary: #4f46e5; --sidebar: #0f172a; --bg: #f1f5f9; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }

        /* Оверлеи */
        .overlay { position: fixed; inset: 0; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
        .card { background: white; padding: 35px; border-radius: 20px; width: 100%; max-width: 450px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 14px; }
        textarea { height: 100px; resize: none; }
        .btn-p { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; }

        /* Интерфейс */
        aside { width: 280px; background: var(--sidebar); color: white; padding: 20px; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
        main { flex: 1; padding: 30px; overflow-y: auto; }
        .main-panel { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        .menu-btn { background: rgba(255,255,255,0.05); color: #94a3b8; padding: 12px; width: 100%; text-align: left; margin: 4px 0; border-radius: 8px; border: none; cursor: pointer; }
        .menu-btn:hover, .menu-btn.active { background: var(--primary); color: white; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #e2e8f0; padding: 12px; text-align: center; }
        th { background: #f8fafc; color: #64748b; font-size: 12px; }
    </style>
</head>
<body>

    <div id="scr-load" class="overlay">
        <h2 style="color: white;">Загрузка системы...</h2>
    </div>

    <div id="scr-login" class="overlay hidden">
        <div class="card" style="text-align: center;">
            <h1>🎓 SmartSchool</h1>
            <button class="btn-p" onclick="login()" style="background: #ea4335;">Войти через Google</button>
        </div>
    </div>

    <div id="scr-survey" class="overlay hidden">
        <div class="card">
            <h3>Регистрация</h3>
            <input type="text" id="reg-name" placeholder="ФИО">
            <select id="reg-role">
                <option value="student">Ученик</option>
                <option value="teacher">Учитель</option>
            </select>
            <select id="reg-class-list"></select>
            <textarea id="reg-proof" placeholder="Доказательство роли (до 1000 симв.)"></textarea>
            <button class="btn-p" onclick="saveReg()">Отправить заявку</button>
        </div>
    </div>

    <div id="scr-wait" class="overlay hidden">
        <div class="card" style="text-align: center;">
            <h2>⏳ Доступ ограничен</h2>
            <p>Ваша заявка проверяется администратором.</p>
            <button onclick="logout()" style="color:red; background:none; border:none; cursor:pointer;">Выйти</button>
        </div>
    </div>

    <div id="scr-main" class="hidden" style="display: flex; width: 100%;">
        <aside>
            <h2 id="role-tag" style="color: #818cf8;">ROLE</h2>
            <p id="email-tag" style="font-size: 11px; opacity: 0.5; margin-bottom: 20px;"></p>

            <label style="font-size: 10px; color: #64748b; text-transform: uppercase;">Класс</label>
            <select id="main-class-select" onchange="updateUI()" style="background:#334155; color:white; border:none; padding:8px; width:100%; margin-bottom: 20px;"></select>

            <div id="subject-menu"></div>

            <div id="admin-only" class="hidden" style="margin-top: 30px; border-top: 1px solid #334155; padding-top: 20px;">
                <button class="menu-btn" onclick="showTab('requests')">🔔 Заявки</button>
                <button class="menu-btn" onclick="showTab('journal')">📖 Журнал</button>
            </div>

            <button onclick="logout()" style="margin-top: auto; background: #334155; color: white; padding: 10px; border: none; border-radius: 8px;">Выйти</button>
        </aside>

        <main>
            <div id="tab-journal">
                <div class="main-panel">
                    <h2 id="view-title">Выберите предмет</h2>
                    <table>
                        <thead><tr><th>ФИО</th><th>Посещение</th><th>Балл</th><th>Тип</th></tr></thead>
                        <tbody id="tbody-journal"></tbody>
                    </table>
                </div>
            </div>
            <div id="tab-requests" class="hidden">
                <div class="main-panel">
                    <h2>Заявки на подтверждение</h2>
                    <div id="list-req"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAWmME75qjW5pxmOjObfVsINaRylPtpL6k",
            authDomain: "auth-project-7aec4.firebaseapp.com",
            databaseURL: "https://auth-project-7aec4-default-rtdb.firebaseio.com",
            projectId: "auth-project-7aec4",
            storageBucket: "auth-project-7aec4.firebasestorage.app",
            messagingSenderId: "1061923785862",
            appId: "1:1061923785862:web:1ab66811d0eeb56b651507"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // Генерация 44 классов
        const classes = [];
        for(let i=1; i<=11; i++) { ['А','Б','В','Г'].forEach(l => classes.push(i + l)); }
        
        const subjects = {
            low: ["Букварь", "Математика", "ИЗО"],
            mid: ["Алгебра", "Геометрия", "История", "Физика"],
            high: ["Информатика", "НВП", "Химия", "История Казахстана"]
        };

        const regSel = document.getElementById('reg-class-list');
        const mainSel = document.getElementById('main-class-select');
        classes.forEach(c => {
            regSel.add(new Option(c + " класс", c));
            mainSel.add(new Option(c + " класс", c));
        });

        // ПРОВЕРКА СЕССИИ (Чтобы не выкидывало)
        auth.onAuthStateChanged(user => {
            document.getElementById('scr-load').classList.add('hidden');
            if (user) {
                db.ref('users/' + user.uid).on('value', s => {
                    const data = s.val();
                    if (user.email === 'ko-23-151@turan-edu.kz') { 
                        currentUser = { role: 'admin', email: user.email }; startApp(); 
                    } else if (!data) { 
                        showScr('scr-survey'); 
                    } else if (data.status === 'pending') { 
                        showScr('scr-wait'); 
                    } else { 
                        currentUser = data; startApp(); 
                    }
                });
            } else { showScr('scr-login'); }
        });

        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { auth.signOut().then(() => location.reload()); }

        function saveReg() {
            const role = document.getElementById('reg-role').value; // ЧИТАЕМ РОЛЬ
            db.ref('users/' + auth.currentUser.uid).set({
                name: document.getElementById('reg-name').value,
                role: role, // ПИШЕМ РОЛЬ
                uClass: document.getElementById('reg-class-list').value,
                proof: document.getElementById('reg-proof').value,
                status: 'pending',
                email: auth.currentUser.email
            });
        }

        function startApp() {
            showScr('scr-main');
            document.getElementById('role-tag').innerText = currentUser.role.toUpperCase();
            document.getElementById('email-tag').innerText = currentUser.email;
            if (currentUser.role === 'admin') document.getElementById('admin-only').classList.remove('hidden');
            if (currentUser.role === 'student') {
                mainSel.value = currentUser.uClass;
                mainSel.disabled = true;
            }
            updateUI();
        }

        function updateUI() {
            const cls = mainSel.value;
            const num = parseInt(cls);
            let subList = num <= 4 ? subjects.low : (num <= 9 ? subjects.mid : subjects.high);
            const menu = document.getElementById('subject-menu');
            menu.innerHTML = '';
            subList.forEach(s => {
                menu.innerHTML += `<button class="menu-btn" onclick="openSub('${s}')">${s}</button>`;
            });
            loadStudents();
        }

        function openSub(name) {
            document.getElementById('view-title').innerText = name + " | " + mainSel.value;
            showTab('journal');
        }

        function loadStudents() {
            const cls = mainSel.value;
            db.ref('users').once('value', s => {
                const users = s.val();
                const tbody = document.getElementById('tbody-journal');
                tbody.innerHTML = '';
                for (let id in users) {
                    // ЖЕСТКАЯ ПРОВЕРКА КЛАССА И РОЛИ УЧЕНИКА
                    if (users[id].uClass === cls && users[id].role === 'student' && users[id].status === 'approved') {
                        tbody.innerHTML += `<tr>
                            <td>${users[id].name}</td>
                            <td><button onclick="this.innerText=this.innerText=='Б'?'Н':'Б'">Б</button></td>
                            <td><input type="number" min="1" max="10" style="width:45px;"></td>
                            <td>Урок</td>
                        </tr>`;
                    }
                }
            });
        }

        function loadRequests() {
            db.ref('users').on('value', s => {
                const users = s.val();
                const list = document.getElementById('list-req');
                list.innerHTML = '';
                for (let id in users) {
                    if (users[id].status === 'pending') {
                        list.innerHTML += `<div style="border:1px solid #ddd; padding:15px; margin-top:10px; border-radius:12px;">
                            <b>${users[id].name}</b> | Класс: ${users[id].uClass} | Роль: ${users[id].role}<br>
                            <p style="background:#f1f5f9; padding:10px; font-size:12px;">${users[id].proof}</p>
                            <button onclick="approve('${id}')" style="background:green; color:white; border:none; padding:8px 20px; border-radius:8px;">Одобрить</button>
                        </div>`;
                    }
                }
            });
        }

        function approve(id) { db.ref('users/' + id).update({ status: 'approved' }); }

        function showScr(id) {
            document.querySelectorAll('.overlay, #scr-main').forEach(el => el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function showTab(id) {
            document.getElementById('tab-journal').classList.add('hidden');
            document.getElementById('tab-requests').classList.add('hidden');
            document.getElementById('tab-' + id).classList.remove('hidden');
            if (id === 'requests') loadRequests();
        }
    </script>
</body>
</html>
