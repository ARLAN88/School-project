<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSystem Pro | Казахстан</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --primary: #2563eb; --success: #10b981; --danger: #ef4444; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; }
        .hidden { display: none !important; }
        
        /* Sidebar */
        aside { width: 280px; background: #1e293b; color: white; display: flex; flex-direction: column; padding: 20px; }
        aside button { background: rgba(255,255,255,0.1); color: white; border: none; padding: 12px; margin: 5px 0; border-radius: 8px; text-align: left; cursor: pointer; }
        aside button:hover { background: var(--primary); }
        .logout-btn { margin-top: auto; background: var(--danger) !important; }

        /* Main Content */
        main { flex: 1; padding: 30px; overflow-y: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #e2e8f0; padding: 10px; text-align: center; }
        th { background: #f8fafc; }

        .grade-input { width: 45px; padding: 5px; text-align: center; border: 1px solid #cbd5e1; border-radius: 4px; }
        .n-btn { cursor: pointer; padding: 4px 8px; border-radius: 4px; border: 1px solid #ccc; background: #eee; }
        .n-active { background: var(--danger); color: white; border-color: var(--danger); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, min-minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 10px; border-left: 4px solid var(--primary); }
        
        #login-screen { position: fixed; inset: 0; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: white; padding: 40px; border-radius: 20px; text-align: center; width: 350px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="margin-bottom: 5px;">EduSystem RK</h2>
            <p style="color: #64748b;">Электронный журнал (10-балл)</p>
            <button onclick="login()" style="width:100%; padding:15px; background:#db4437; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">
                Войти через Google
            </button>
        </div>
    </div>

    <aside id="sidebar" class="hidden">
        <h3 id="user-role-label">Загрузка...</h3>
        <p id="user-email-label" style="font-size: 0.8rem; opacity: 0.7;"></p>
        <hr style="width:100%; opacity:0.2;">
        
        <div id="nav-admin" class="hidden">
            <button onclick="showSection('section-requests')">🔔 Заявки (Модерация)</button>
            <button onclick="showSection('section-journal')">📊 Общий журнал</button>
        </div>

        <div id="nav-teacher" class="hidden">
            <button onclick="showSection('section-journal')">📓 Мой журнал</button>
            <button onclick="showSection('section-analytics')">📈 Аналитика класса</button>
        </div>

        <button class="logout-btn" onclick="logout()">🚪 Выйти из системы</button>
    </aside>

    <main id="main-content" class="hidden">
        
        <section id="section-requests" class="hidden">
            <div class="card">
                <h3>Заявки на доступ</h3>
                <table id="requests-table">
                    <thead><tr><th>ФИО / Email</th><th>Роль</th><th>Инфо</th><th>Действие</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>

        <section id="section-journal" class="hidden">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3>Классный журнал: 11 "А" | Предмет: Информатика</h3>
                    <input type="date" id="journal-date" value="2024-09-01" onchange="loadJournalData()">
                </div>
                
                <div class="stats-grid" style="margin-top:20px;">
                    <div class="stat-card">Средний балл: <b id="avg-total">0</b></div>
                    <div class="stat-card">Посещаемость: <b id="att-total">0%</b></div>
                </div>

                <table id="journal-table">
                    <thead>
                        <tr>
                            <th>Ученик</th>
                            <th>Посещаемость</th>
                            <th>Оценка (1-10)</th>
                            <th>Тип работы</th>
                            <th>Ср. балл</th>
                        </tr>
                    </thead>
                    <tbody id="journal-body">
                        </tbody>
                </table>
                <br>
                <button onclick="saveJournal()" style="background:var(--success); color:white; padding:12px 25px; border:none; border-radius:8px; cursor:pointer;">💾 Сохранить в облако</button>
                <button onclick="exportToExcel()" style="background:#1d6f42; color:white; padding:12px 25px; border:none; border-radius:8px; cursor:pointer; margin-left:10px;">Excel Отчет</button>
            </div>
        </section>

        <section id="section-analytics" class="hidden">
            <div class="card">
                <h3>Визуализация успеваемости</h3>
                <canvas id="attendanceChart" width="400" height="150"></canvas>
            </div>
        </section>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAWmME75qjW5pxmOjObfVsINaRylPtpL6k",
            authDomain: "auth-project-7aec4.firebaseapp.com",
            databaseURL: "https://auth-project-7aec4-default-rtdb.firebaseio.com",
            projectId: "auth-project-7aec4",
            storageBucket: "auth-project-7aec4.firebasestorage.app",
            messagingSenderId: "1061923785862",
            appId: "1:1061923785862:web:1ab66811d0eeb56b651507"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        let currentUser = null;

        // ВХОД
        function login() {
            auth.signInWithPopup(provider).then(res => {
                checkAccess(res.user);
            });
        }

        // ВЫХОД
        function logout() {
            auth.signOut().then(() => {
                location.reload();
            });
        }

        function checkAccess(user) {
            const uid = user.uid;
            // Админ по почте
            if (user.email === 'ko-23-151@turan-edu.kz') {
                currentUser = { role: 'admin', email: user.email };
                initUI();
                return;
            }

            db.ref('users/' + uid).once('value', s => {
                const data = s.val();
                if (data && data.status === 'approved') {
                    currentUser = { uid, ...data };
                    initUI();
                } else if (!data) {
                    // Регистрация новой заявки (упростим для теста)
                    const name = prompt("Введите ваше ФИО:");
                    const role = prompt("Кто вы? (teacher/student):");
                    db.ref('users/' + uid).set({
                        name: name, role: role, status: 'pending', email: user.email
                    });
                    alert("Заявка отправлена админу!");
                } else {
                    alert("Ваш аккаунт на проверке!");
                }
            });
        }

        function initUI() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('user-email-label').innerText = currentUser.email;
            document.getElementById('user-role-label').innerText = currentUser.role.toUpperCase();

            if (currentUser.role === 'admin') {
                document.getElementById('nav-admin').classList.remove('hidden');
                showSection('section-requests');
                loadRequests();
            } else {
                document.getElementById('nav-teacher').classList.remove('hidden');
                showSection('section-journal');
                loadJournalData();
            }
        }

        // МОДЕРНИЗАЦИЯ (АДМИН)
        function loadRequests() {
            db.ref('users').on('value', s => {
                const list = s.val();
                const tbody = document.querySelector('#requests-table tbody');
                tbody.innerHTML = '';
                for (let id in list) {
                    if (list[id].status === 'pending') {
                        tbody.innerHTML += `<tr>
                            <td>${list[id].name}<br>${list[id].email}</td>
                            <td>${list[id].role}</td>
                            <td>${list[id].proof || 'Нет данных'}</td>
                            <td><button onclick="approve('${id}')">Одобрить</button></td>
                        </tr>`;
                    }
                }
            });
        }

        function approve(uid) {
            db.ref('users/' + uid).update({ status: 'approved' });
        }

        // ЖУРНАЛ И АНАЛИТИКА
        const students = ["Абишев А.", "Бериков Д.", "Иванова Е.", "Касымов М.", "Нурахметов С."]; // Тестовый список

        function loadJournalData() {
            const date = document.getElementById('journal-date').value;
            const tbody = document.getElementById('journal-body');
            tbody.innerHTML = '';

            students.forEach(name => {
                tbody.innerHTML += `
                    <tr data-name="${name}">
                        <td>${name}</td>
                        <td><button class="n-btn" onclick="toggleAttendance(this)">Б</button></td>
                        <td><input type="number" class="grade-input" min="1" max="10" oninput="calculateStats()"></td>
                        <td>
                            <select>
                                <option value="lesson">Урок</option>
                                <option value="sor">СОР</option>
                                <option value="soch">СОЧ</option>
                            </select>
                        </td>
                        <td class="row-avg">-</td>
                    </tr>
                `;
            });
            calculateStats();
        }

        function toggleAttendance(btn) {
            if (btn.innerText === 'Б') { btn.innerText = 'Н'; btn.classList.add('n-active'); }
            else if (btn.innerText === 'Н') { btn.innerText = 'У'; btn.style.background = 'orange'; }
            else { btn.innerText = 'Б'; btn.classList.remove('n-active'); btn.style.background = '#eee'; }
            calculateStats();
        }

        function calculateStats() {
            let totalGrade = 0;
            let gradeCount = 0;
            let n_count = 0;

            document.querySelectorAll('#journal-body tr').forEach(row => {
                const grade = row.querySelector('.grade-input').value;
                const att = row.querySelector('.n-btn').innerText;
                
                if (grade) {
                    totalGrade += parseInt(grade);
                    gradeCount++;
                    row.querySelector('.row-avg').innerText = grade;
                }
                if (att === 'Н') n_count++;
            });

            const avg = gradeCount > 0 ? (totalGrade / gradeCount).toFixed(1) : 0;
            const attendance = ((students.length - n_count) / students.length * 100).toFixed(0);

            document.getElementById('avg-total').innerText = avg;
            document.getElementById('att-total').innerText = attendance + "%";
        }

        function saveJournal() {
            alert("Данные за " + document.getElementById('journal-date').value + " сохранены в Firebase!");
        }

        function exportToExcel() {
            var wb = XLSX.utils.table_to_book(document.getElementById('journal-table'), {sheet: "Журнал"});
            XLSX.writeFile(wb, "Report_School_RK.xlsx");
        }

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
